# 根据 CPU 核心数自动设置，或手动填写核心数（如 2、4）
worker_processes  auto;

# 提升文件描述符上限
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # 开启 gzip 压缩（可选，减少传输量）
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # 定义后端 upstream，支持失败重试
    upstream backend {
        server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # 80 端口：HTTP 统一跳转 HTTPS
    server {
        listen 80;
        server_name 82.157.176.188 www.yqtx.site;
        return 301 https://www.yqtx.site$request_uri;
    }

    # 443 端口：HTTPS 反向代理
    server {
        listen       443 ssl;
        server_name  www.yqtx.site;

        ssl_certificate      /home/app/yqtx.site_nginx/yqtx.site_bundle.pem;
        ssl_certificate_key  /home/app/yqtx.site_nginx/yqtx.site.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # 反向代理 /api/ 到后端
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 文件上传大小限制（与 Spring Boot 保持一致）
            client_max_body_size 20m;

            # 超时时间（登录、获取伴侣信息等接口适当放宽）
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # 缓冲区配置，防止大响应被截断
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;

            # 后端失败时重试一次（注意：POST 请求重试可能有副作用，按需保留）
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        # 用户上传的静态文件（头像、打卡图片等）
        location /profile/ {
            alias /home/app/uploadPath/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            # 防止目录遍历
            autoindex off;
        }

        # 静态文件或前端（如有）
        location / {
            root   html;
            index  index.html index.htm;
        }
    }
}
